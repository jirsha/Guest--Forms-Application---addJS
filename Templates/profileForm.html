<!-- page that contains the input form -->
{% extends "base.html" %}

{% block content %}
<h2>User Profile</h2>

{% if error %}
<div class="error-message">
    <p class="error">{{ error }}</p>
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data" id="profileForm">
    <div>
        <label for="name">Name *:</label>
        <input type="text" id="name" name="name" required>
    </div>
    
    <div>
        <label for="email">Email *:</label>
        <input type="email" id="email" name="email" required>
    </div>
    
    <div>
        <label for="quan">Total Quantity *:</label>
        <input type="number" id="quan" name="quan" min="1" max="10" required>
    </div>
    
    <div>
        <label for="comments">Comments or Issues:</label>
        <textarea id="comments" name="comments" rows="4"></textarea>
    </div>
    
    <div>
        <label for="rel">Relationship to me *:</label>
        <select id="rel" name="rel" required>
            <option value="">What is guest's relationship to me</option>
            <option value="parent">Parent / Parent-in-law</option>
            <option value="sibling">Sibling / Sibling-in-law</option>
            <option value="other family">Other family member</option>
            <option value="coworker etc.">Coworker or business</option>
            <option value="friend">Friend</option>
            <option value="other">Other</option>
        </select>
    </div>

    <div>
        <label for="accommodations">Accommodations Required?</label>
        <input type="checkbox" id="accommodations" name="accommodations" value="yes">
    </div>
    
    <div class="file-upload-container">
        <label for="profile_picture">Profile Picture:</label>
        <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
        <small>Optional. Maximum file size: {{ upload_config.max_file_size_mb }}MB. Allowed formats: {{ upload_config.allowed_extensions_str }}</small>
        <div id="file-error" class="file-error" style="display: none;"></div>
        <div id="file-info" class="file-info" style="display: none;"></div>
    </div>
    
    <button type="submit">Save Profile</button>
</form>

<!-- Pass config to JavaScript -->
<script>
    window.UPLOAD_CONFIG = {{ upload_config | tojson }};
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
